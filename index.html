<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>营救女孩 - 僵尸围城</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a0a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Arial', sans-serif;
  overflow: hidden;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}
#gameContainer {
  position: relative;
  width: 400px;
  height: 700px;
}
canvas {
  display: block;
  border-radius: 12px;
  box-shadow: 0 0 30px rgba(0,200,100,0.3);
}
#ui-overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
}
#score-panel {
  position: absolute;
  top: 10px; left: 10px; right: 10px;
  display: flex;
  justify-content: space-between;
  color: #fff;
  font-size: 16px;
  font-weight: bold;
  text-shadow: 0 0 8px rgba(0,0,0,0.8);
  pointer-events: none;
}
#combo-display {
  position: absolute;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #ffeb3b;
  font-size: 48px;
  font-weight: bold;
  text-shadow: 0 0 20px rgba(255,235,59,0.8);
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
}
/* Start / Game Over screens */
.screen-overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.85);
  z-index: 20;
  pointer-events: all;
}
.screen-overlay.hidden { display: none; }
.screen-overlay h1 {
  color: #4caf50;
  font-size: 36px;
  margin-bottom: 10px;
  text-shadow: 0 0 20px rgba(76,175,80,0.6);
}
.screen-overlay h2 {
  color: #f44336;
  font-size: 28px;
  margin-bottom: 10px;
}
.screen-overlay p {
  color: #ccc;
  font-size: 14px;
  margin: 5px 20px;
  text-align: center;
  line-height: 1.6;
}
.screen-overlay .score-final {
  color: #ffeb3b;
  font-size: 24px;
  margin: 15px 0;
}
.btn-play {
  margin-top: 25px;
  padding: 15px 50px;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  background: linear-gradient(135deg, #4caf50, #2e7d32);
  border: none;
  border-radius: 30px;
  cursor: pointer;
  pointer-events: all;
  box-shadow: 0 4px 15px rgba(76,175,80,0.4);
  transition: transform 0.15s;
}
.btn-play:active { transform: scale(0.95); }
.zombie-emoji { font-size: 60px; margin: 10px 0; }
</style>
</head>
<body>

<div id="gameContainer">
  <canvas id="gameCanvas" width="400" height="700"></canvas>

  <div id="ui-overlay">
    <div id="score-panel">
      <span id="level-text">第 1 关</span>
      <span id="score-text">分数: 0</span>
    </div>
    <div id="combo-display"></div>
  </div>

  <!-- Start Screen -->
  <div class="screen-overlay" id="startScreen">
    <div class="zombie-emoji">🧟‍♂️</div>
    <h1>营救女孩</h1>
    <p style="color:#4caf50; font-size:18px; font-weight:bold;">僵尸围城</p>
    <p>僵尸正在逼近女孩！<br>点击对应颜色的大炮，消灭僵尸！<br>犹豫就会败北！</p>
    <button class="btn-play" id="btnStart">开始营救</button>
  </div>

  <!-- Game Over Screen -->
  <div class="screen-overlay hidden" id="gameOverScreen">
    <div class="zombie-emoji">💀</div>
    <h2>营救失败</h2>
    <p>女孩被僵尸抓走了...</p>
    <div class="score-final" id="finalScore">分数: 0</div>
    <p id="finalLevel">到达第 1 关</p>
    <button class="btn-play" id="btnRestart">重新营救</button>
  </div>

  <!-- Win Screen -->
  <div class="screen-overlay hidden" id="winScreen">
    <div style="font-size:60px; margin:10px 0;">🎉</div>
    <h1 style="color:#ffeb3b;">营救成功!</h1>
    <p>你击退了所有僵尸，女孩安全了！</p>
    <div class="score-final" id="winScore">分数: 0</div>
    <button class="btn-play" id="btnNextLevel">下一关</button>
  </div>
</div>

<script>
// ============================================================
// 营救女孩 - 僵尸围城  v1.1 (bug-fixed)
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ---- Responsive sizing (fix: proper coordinate mapping) ----
let canvasScale = 1;
let canvasOffsetX = 0, canvasOffsetY = 0;

function resize() {
  const container = document.getElementById('gameContainer');
  const maxW = Math.min(window.innerWidth - 10, 400);
  const maxH = Math.min(window.innerHeight - 10, 700);
  canvasScale = Math.min(maxW / 400, maxH / 700);
  container.style.transform = `scale(${canvasScale})`;
  container.style.transformOrigin = 'center center';
  const rect = canvas.getBoundingClientRect();
  canvasOffsetX = rect.left;
  canvasOffsetY = rect.top;
}
window.addEventListener('resize', resize);
resize();

// Map screen coords to canvas coords (fix #6: touch coordinate offset)
function screenToCanvas(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) * (W / rect.width),
    y: (clientY - rect.top) * (H / rect.height),
  };
}

// ---- Constants ----
const W = 400, H = 700;
const CANNON_Y = 610;
const GIRL_X = 200, GIRL_Y = 80;
const COLORS = ['#f44336', '#2196f3', '#4caf50', '#ff9800', '#9c27b0'];
const COLOR_NAMES = ['红', '蓝', '绿', '橙', '紫'];
const CANNON_COUNT = 5;
const CANNON_SPACING = W / (CANNON_COUNT + 1);

// ---- Audio (simple beep synthesis) ----
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new AudioCtx(); } catch(e) {}
  }
}

function playBeep(freq, duration, type, vol) {
  if (!audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || 'square';
    osc.frequency.value = freq;
    gain.gain.value = vol || 0.1;
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

function sfxShoot() { playBeep(440, 0.08, 'square', 0.08); }
function sfxHit() { playBeep(660, 0.12, 'sine', 0.12); }
function sfxKill() { playBeep(880, 0.2, 'sine', 0.15); }
function sfxMiss() { playBeep(200, 0.15, 'sawtooth', 0.06); }
function sfxHurt() { playBeep(150, 0.3, 'sawtooth', 0.15); }
function sfxWin() {
  [523, 659, 784, 1047].forEach((f, i) => {
    setTimeout(() => playBeep(f, 0.2, 'sine', 0.12), i * 120);
  });
}
function sfxLose() {
  [400, 350, 300, 200].forEach((f, i) => {
    setTimeout(() => playBeep(f, 0.25, 'sawtooth', 0.1), i * 150);
  });
}

// ---- Game State ----
let state = {
  phase: 'start',
  level: 1,
  score: 0,
  combo: 0,
  maxCombo: 0,
  zombies: [],
  bullets: [],
  particles: [],
  floatingTexts: [],
  cannons: [],
  cannonCooldowns: [],
  girlHP: 5,
  maxGirlHP: 5,
  zombieSpeed: 0.3,
  spawnTimer: 0,
  spawnInterval: 120,
  zombiesSpawned: 0,
  zombiesDefeated: 0,
  totalZombiesInLevel: 0,
  screenShake: 0,
  comboTimer: 0,
  flashColor: null,
  flashTimer: 0,
  girlInvincible: 0,     // invincibility frames after hit
  girlDamageFlash: 0,
};

// ---- Init Cannons ----
function initCannons() {
  state.cannons = [];
  state.cannonCooldowns = [];
  for (let i = 0; i < CANNON_COUNT; i++) {
    state.cannons.push({
      x: CANNON_SPACING * (i + 1),
      y: CANNON_Y,
      color: COLORS[i],
      colorName: COLOR_NAMES[i],
      recoil: 0,
    });
    state.cannonCooldowns.push(0);
  }
}

// ---- Zombie Factory ----
function createZombie() {
  const segCount = 2 + Math.floor(Math.random() * Math.min(state.level, 4));
  const segments = [];
  for (let i = 0; i < segCount; i++) {
    segments.push({
      colorIdx: Math.floor(Math.random() * CANNON_COUNT),
      alive: true,
    });
  }
  // Vary spawn positions across the right side
  const startX = 320 + Math.random() * 100;
  const startY = 120 + Math.random() * 400;
  return {
    x: startX,
    y: startY,
    targetX: GIRL_X + (Math.random() - 0.5) * 80,
    targetY: GIRL_Y + 30,
    segments: segments,
    speed: state.zombieSpeed + Math.random() * 0.12,
    alive: true,
    reachedGirl: false,
    walkFrame: Math.random() * Math.PI * 2, // random start phase
    size: 26 + segCount * 3,
    hitFlash: 0,
    opacity: 1,
    spawnAnim: 20, // spawn fade-in
  };
}

// ---- Spawn Wave ----
function spawnWave() {
  if (state.zombiesSpawned >= state.totalZombiesInLevel) return;
  const count = Math.min(
    1 + Math.floor(state.level / 2),
    state.totalZombiesInLevel - state.zombiesSpawned
  );
  for (let i = 0; i < count; i++) {
    state.zombies.push(createZombie());
    state.zombiesSpawned++;
  }
}

// ---- Particle Effects ----
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 5;
    state.particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      life: 25 + Math.random() * 20,
      maxLife: 45,
      color,
      size: 2 + Math.random() * 4,
    });
  }
}

function spawnExplosion(x, y, color) {
  spawnParticles(x, y, color, 12);
  spawnParticles(x, y, '#fff', 4);
}

// Floating score text
function spawnFloatingText(x, y, text, color) {
  state.floatingTexts.push({
    x, y, text, color,
    life: 40,
    maxLife: 40,
    vy: -1.5,
  });
}

// ---- Shoot ----
function shootCannon(cannonIdx) {
  if (state.phase !== 'playing') return;
  if (state.cannonCooldowns[cannonIdx] > 0) return;

  ensureAudio();
  const cannon = state.cannons[cannonIdx];
  cannon.recoil = 8;
  state.cannonCooldowns[cannonIdx] = 10;

  state.bullets.push({
    x: cannon.x,
    y: cannon.y - 25,
    vy: -9,
    colorIdx: cannonIdx,
    color: cannon.color,
    size: 8,
    trail: [],
    dead: false, // fix #1: explicit dead flag
  });
  sfxShoot();
}

// ---- Input (fix #6: proper coordinate mapping) ----
function handleTap(px, py) {
  if (state.phase !== 'playing') return;

  // Tap on cannons (generous hit area)
  for (let i = 0; i < CANNON_COUNT; i++) {
    const c = state.cannons[i];
    if (Math.abs(px - c.x) < 30 && py > CANNON_Y - 50) {
      shootCannon(i);
      return;
    }
  }
  // Tap on bottom area → shoot nearest cannon
  if (py > H * 0.55) {
    let nearest = 0, minDist = Infinity;
    for (let i = 0; i < CANNON_COUNT; i++) {
      const d = Math.abs(px - state.cannons[i].x);
      if (d < minDist) { minDist = d; nearest = i; }
    }
    shootCannon(nearest);
  }
}

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  const pos = screenToCanvas(t.clientX, t.clientY);
  handleTap(pos.x, pos.y);
}, { passive: false });

canvas.addEventListener('mousedown', (e) => {
  const pos = screenToCanvas(e.clientX, e.clientY);
  handleTap(pos.x, pos.y);
});

// ---- Update ----
function update() {
  if (state.phase !== 'playing') return;

  // Spawn timer
  state.spawnTimer++;
  if (state.spawnTimer >= state.spawnInterval && state.zombiesSpawned < state.totalZombiesInLevel) {
    spawnWave();
    state.spawnTimer = 0;
  }

  // Cannon cooldowns & recoil
  for (let i = 0; i < CANNON_COUNT; i++) {
    if (state.cannonCooldowns[i] > 0) state.cannonCooldowns[i]--;
    if (state.cannons[i].recoil > 0.1) state.cannons[i].recoil *= 0.85;
    else state.cannons[i].recoil = 0;
  }

  // Invincibility timer
  if (state.girlInvincible > 0) state.girlInvincible--;
  if (state.girlDamageFlash > 0) state.girlDamageFlash--;

  // Update bullets
  for (let b of state.bullets) {
    if (b.dead) continue;
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 6) b.trail.shift();
    b.y += b.vy;
    if (b.y < -20) b.dead = true;
  }

  // Update zombies
  for (let z of state.zombies) {
    if (!z.alive) continue;

    // Spawn animation
    if (z.spawnAnim > 0) {
      z.spawnAnim--;
      z.opacity = 1 - z.spawnAnim / 20;
    }

    // Move towards girl
    const dx = z.targetX - z.x;
    const dy = z.targetY - z.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 1) {
      z.x += (dx / dist) * z.speed;
      z.y += (dy / dist) * z.speed;
    }

    z.walkFrame += 0.05;
    if (z.hitFlash > 0) z.hitFlash--;

    // Check if reached girl (fix #5: tighter collision)
    const distToGirl = Math.sqrt((z.x - GIRL_X) ** 2 + (z.y - GIRL_Y) ** 2);
    if (distToGirl < 35 && state.girlInvincible <= 0) {
      z.alive = false;
      state.girlHP--;
      state.screenShake = 15;
      state.combo = 0;
      state.girlInvincible = 60; // 1 second invincibility
      state.girlDamageFlash = 30;
      spawnParticles(GIRL_X, GIRL_Y, '#f44336', 15);
      spawnFloatingText(GIRL_X, GIRL_Y - 50, '-1 ❤️', '#f44336');
      sfxHurt();

      if (state.girlHP <= 0) {
        gameOver();
        return;
      }
    }
  }

  // Fix #1 & #3: Bullet-Zombie collision with proper dead flags
  for (let b of state.bullets) {
    if (b.dead) continue;

    for (let z of state.zombies) {
      if (!z.alive || z.spawnAnim > 10) continue;

      const dx = b.x - z.x;
      const dy = b.y - z.y;
      const hitDist = z.size + b.size;

      if (dx * dx + dy * dy < hitDist * hitDist) {
        b.dead = true; // fix #1: bullet consumed immediately

        // Find first matching alive segment
        let matched = false;
        for (let seg of z.segments) {
          if (seg.alive && seg.colorIdx === b.colorIdx) {
            seg.alive = false;
            matched = true;

            // Score with combo
            const points = Math.floor(10 * (1 + state.combo * 0.5));
            state.score += points;
            state.combo++;
            if (state.combo > state.maxCombo) state.maxCombo = state.combo;
            state.comboTimer = 120; // 2 seconds to keep combo

            spawnExplosion(b.x, b.y, b.color);
            spawnFloatingText(b.x, b.y - 10, `+${points}`, b.color);
            state.flashColor = b.color;
            state.flashTimer = 4;
            sfxHit();
            break;
          }
        }

        if (!matched) {
          // Wrong color
          spawnParticles(b.x, b.y, '#666', 3);
          if (state.combo > 2) {
            spawnFloatingText(b.x, b.y - 10, 'Miss!', '#888');
          }
          state.combo = 0;
          sfxMiss();
        }

        // Check if zombie fully dead (fix #3: only count once)
        if (z.alive && z.segments.every(s => !s.alive)) {
          z.alive = false;
          state.zombiesDefeated++;
          state.score += 50;
          spawnExplosion(z.x, z.y, '#4caf50');
          spawnFloatingText(z.x, z.y - 30, '💀+50', '#4caf50');
          sfxKill();

          // Check win
          if (state.zombiesDefeated >= state.totalZombiesInLevel) {
            winLevel();
            return;
          }
        }

        z.hitFlash = 6;
        break; // fix #1: stop checking other zombies for this bullet
      }
    }
  }

  // Combo decay
  if (state.comboTimer > 0) {
    state.comboTimer--;
    if (state.comboTimer <= 0) state.combo = 0;
  }

  // Update particles
  for (let p of state.particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.12;
    p.life--;
  }

  // Update floating texts
  for (let ft of state.floatingTexts) {
    ft.y += ft.vy;
    ft.life--;
  }

  // Screen shake decay
  if (state.screenShake > 0.3) state.screenShake *= 0.88;
  else state.screenShake = 0;
  if (state.flashTimer > 0) state.flashTimer--;

  // Cleanup
  state.bullets = state.bullets.filter(b => !b.dead);
  state.zombies = state.zombies.filter(z => z.alive || z.hitFlash > 0);
  state.particles = state.particles.filter(p => p.life > 0);
  state.floatingTexts = state.floatingTexts.filter(ft => ft.life > 0);

  // Update UI
  document.getElementById('level-text').textContent = `第 ${state.level} 关`;
  document.getElementById('score-text').textContent = `分数: ${Math.floor(state.score)}`;

  // Combo display
  const comboEl = document.getElementById('combo-display');
  if (state.combo >= 3) {
    comboEl.textContent = `${state.combo}连击!`;
    comboEl.style.opacity = '1';
    comboEl.style.transform = `translate(-50%, -50%) scale(${1 + state.combo * 0.03})`;
  } else {
    comboEl.style.opacity = '0';
  }
}

// ---- Draw ----
function draw() {
  ctx.save();

  // Screen shake
  if (state.screenShake > 0.3) {
    ctx.translate(
      (Math.random() - 0.5) * state.screenShake * 2,
      (Math.random() - 0.5) * state.screenShake * 2
    );
  }

  // Background
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#0d1b2a');
  bgGrad.addColorStop(0.5, '#1b2838');
  bgGrad.addColorStop(1, '#1a0f2e');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let gx = 0; gx < W; gx += 40) {
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
  }
  for (let gy = 0; gy < H; gy += 40) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
  }

  // Ground area
  const groundGrad = ctx.createLinearGradient(0, CANNON_Y - 40, 0, H);
  groundGrad.addColorStop(0, '#2a1a0a');
  groundGrad.addColorStop(1, '#1a0f05');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, CANNON_Y - 40, W, H - CANNON_Y + 40);
  ctx.fillStyle = '#4a3520';
  ctx.fillRect(0, CANNON_Y - 40, W, 3);

  // Color flash
  if (state.flashTimer > 0 && state.flashColor) {
    ctx.fillStyle = state.flashColor + '15';
    ctx.fillRect(0, 0, W, H);
  }

  // Draw girl (before zombies so zombies appear in front)
  drawGirl();

  // Draw zombies
  for (let z of state.zombies) {
    if (z.alive || z.hitFlash > 0) drawZombie(z);
  }

  // Draw bullets
  for (let b of state.bullets) {
    if (b.dead) continue;
    // Trail
    for (let i = 0; i < b.trail.length; i++) {
      const t = b.trail[i];
      const alpha = (i + 1) / b.trail.length * 0.4;
      const sz = b.size * (i / b.trail.length) * 0.8;
      ctx.beginPath();
      ctx.arc(t.x, t.y, sz, 0, Math.PI * 2);
      ctx.fillStyle = b.color + Math.floor(alpha * 255).toString(16).padStart(2, '0');
      ctx.fill();
    }
    // Bullet body
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
    ctx.fillStyle = b.color;
    ctx.fill();
    // Highlight
    ctx.beginPath();
    ctx.arc(b.x - 2, b.y - 2, b.size * 0.45, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fill();
    // Glow
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size + 4, 0, Math.PI * 2);
    ctx.fillStyle = b.color + '30';
    ctx.fill();
  }

  // Draw cannons
  for (let i = 0; i < CANNON_COUNT; i++) {
    drawCannon(state.cannons[i], i);
  }

  // Draw particles
  for (let p of state.particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Draw floating texts
  for (let ft of state.floatingTexts) {
    const alpha = ft.life / ft.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = ft.color;
    ctx.font = `bold ${16 + (1 - alpha) * 6}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
  }
  ctx.globalAlpha = 1;

  // HP bar
  drawHPBar();

  // Progress bar
  if (state.phase === 'playing') {
    const barW = W - 40;
    const progress = state.totalZombiesInLevel > 0
      ? state.zombiesDefeated / state.totalZombiesInLevel : 0;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    roundRect(ctx, 20, 660, barW, 10, 5);
    ctx.fill();
    if (progress > 0) {
      ctx.fillStyle = '#4caf50';
      roundRect(ctx, 20, 660, barW * Math.min(progress, 1), 10, 5);
      ctx.fill();
    }
    ctx.fillStyle = '#ccc';
    ctx.font = '11px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`消灭: ${state.zombiesDefeated} / ${state.totalZombiesInLevel}`, W / 2, 690);
  }

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawGirl() {
  const x = GIRL_X, y = GIRL_Y;
  const damageAlpha = state.girlDamageFlash > 0 ? 0.5 + Math.sin(state.girlDamageFlash * 0.5) * 0.5 : 1;

  ctx.save();
  ctx.globalAlpha = damageAlpha;

  // Glow
  const glow = ctx.createRadialGradient(x, y, 5, x, y, 55);
  glow.addColorStop(0, 'rgba(255,105,180,0.25)');
  glow.addColorStop(1, 'rgba(255,105,180,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(x - 55, y - 55, 110, 110);

  // Dress
  ctx.fillStyle = '#ff69b4';
  ctx.beginPath();
  ctx.moveTo(x - 16, y + 5);
  ctx.lineTo(x - 20, y + 35);
  ctx.lineTo(x + 20, y + 35);
  ctx.lineTo(x + 16, y + 5);
  ctx.closePath();
  ctx.fill();

  // Head
  ctx.fillStyle = '#ffe0bd';
  ctx.beginPath();
  ctx.arc(x, y - 10, 14, 0, Math.PI * 2);
  ctx.fill();

  // Hair
  ctx.fillStyle = '#6B3410';
  ctx.beginPath();
  ctx.arc(x, y - 16, 14, Math.PI * 0.9, Math.PI * 2.1);
  ctx.fill();
  // Side hair
  ctx.fillRect(x - 15, y - 16, 5, 22);
  ctx.fillRect(x + 10, y - 16, 5, 22);
  // Bangs
  ctx.beginPath();
  ctx.arc(x, y - 18, 14, Math.PI * 0.85, Math.PI * 2.15);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(x - 5, y - 10, 2.2, 0, Math.PI * 2);
  ctx.arc(x + 5, y - 10, 2.2, 0, Math.PI * 2);
  ctx.fill();
  // Eye highlights
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x - 4, y - 11, 0.8, 0, Math.PI * 2);
  ctx.arc(x + 6, y - 11, 0.8, 0, Math.PI * 2);
  ctx.fill();

  // Mouth
  ctx.strokeStyle = '#c0392b';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  if (state.girlHP <= 2) {
    // Scared O mouth
    ctx.arc(x, y, 3, 0, Math.PI * 2);
  } else {
    // Worried
    ctx.arc(x, y + 1, 4, 0.3, Math.PI - 0.3);
  }
  ctx.stroke();

  // Arms
  ctx.strokeStyle = '#ffe0bd';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  const armWave = Math.sin(Date.now() * 0.005) * 3;
  ctx.beginPath();
  ctx.moveTo(x - 14, y + 8);
  ctx.lineTo(x - 24, y - 2 + armWave);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + 14, y + 8);
  ctx.lineTo(x + 24, y - 2 - armWave);
  ctx.stroke();

  // "Help!" bubble
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  roundRect(ctx, x + 20, y - 50, 42, 22, 8);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('救命!', x + 41, y - 34);

  ctx.restore();
}

function drawZombie(z) {
  const { x, y, segments, size, hitFlash, walkFrame, alive, opacity, spawnAnim } = z;

  ctx.save();
  ctx.globalAlpha = opacity * (alive ? 1 : hitFlash / 6);

  const wobble = Math.sin(walkFrame * 3) * 3;
  const bodyColor = hitFlash > 0 ? '#fff' : '#4a7a4a';
  const headColor = hitFlash > 0 ? '#fff' : '#5a8a4a';

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(x, y + size * 0.7, size * 0.4, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.ellipse(x + wobble, y + 8, size * 0.45, size * 0.55, 0, 0, Math.PI * 2);
  ctx.fill();

  // Torn clothes detail
  ctx.fillStyle = hitFlash > 0 ? '#ddd' : '#3a5a3a';
  ctx.beginPath();
  ctx.ellipse(x + wobble, y + 12, size * 0.35, size * 0.3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.fillStyle = headColor;
  ctx.beginPath();
  ctx.arc(x + wobble, y - size * 0.3, size * 0.32, 0, Math.PI * 2);
  ctx.fill();

  // Eyes (glowing red)
  const eyeGlow = alive ? 0.7 + Math.sin(Date.now() * 0.008) * 0.3 : 0.2;
  ctx.fillStyle = alive ? `rgba(255,50,50,${eyeGlow})` : '#555';
  ctx.beginPath();
  ctx.arc(x + wobble - 5, y - size * 0.3, 3.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x + wobble + 5, y - size * 0.3, 3.5, 0, Math.PI * 2);
  ctx.fill();
  // Eye glow
  if (alive) {
    ctx.fillStyle = `rgba(255,0,0,${eyeGlow * 0.3})`;
    ctx.beginPath();
    ctx.arc(x + wobble - 5, y - size * 0.3, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + wobble + 5, y - size * 0.3, 7, 0, Math.PI * 2);
    ctx.fill();
  }

  // Arms (reaching forward like classic zombie)
  ctx.strokeStyle = bodyColor;
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  const armReach = Math.sin(walkFrame * 2) * 4;
  ctx.beginPath();
  ctx.moveTo(x + wobble - size * 0.35, y + 2);
  ctx.lineTo(x + wobble - size * 0.7, y - 8 + armReach);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + wobble + size * 0.35, y + 2);
  ctx.lineTo(x + wobble + size * 0.7, y - 8 - armReach);
  ctx.stroke();

  // Color segments (glowing orbs on zombie body)
  let segStartY = y - size * 0.45;
  for (let i = 0; i < segments.length; i++) {
    const seg = segments[i];
    if (!seg.alive) continue;
    const sx = x + wobble + (i % 2 === 0 ? -10 : 10);
    const sy = segStartY - i * 14;

    // Glow
    ctx.beginPath();
    ctx.arc(sx, sy, 11, 0, Math.PI * 2);
    ctx.fillStyle = COLORS[seg.colorIdx] + '40';
    ctx.fill();
    // Orb
    ctx.beginPath();
    ctx.arc(sx, sy, 7, 0, Math.PI * 2);
    ctx.fillStyle = COLORS[seg.colorIdx];
    ctx.fill();
    // Highlight
    ctx.beginPath();
    ctx.arc(sx - 2, sy - 2, 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.fill();
  }

  // Legs
  ctx.strokeStyle = bodyColor;
  ctx.lineWidth = 4;
  const legAnim = Math.sin(walkFrame * 3) * 6;
  ctx.beginPath();
  ctx.moveTo(x + wobble - 5, y + size * 0.45);
  ctx.lineTo(x + wobble - 5 - legAnim, y + size * 0.55 + 14);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + wobble + 5, y + size * 0.45);
  ctx.lineTo(x + wobble + 5 + legAnim, y + size * 0.55 + 14);
  ctx.stroke();

  ctx.restore();
}

function drawCannon(c, idx) {
  const { x, y, color, recoil } = c;
  const ry = y + recoil;

  ctx.save();

  // Base platform
  ctx.fillStyle = '#444';
  roundRect(ctx, x - 24, ry - 2, 48, 16, 4);
  ctx.fill();

  // Barrel body
  ctx.fillStyle = color;
  roundRect(ctx, x - 9, ry - 30 + recoil * 0.3, 18, 30, 3);
  ctx.fill();

  // Barrel rim
  ctx.fillStyle = darkenColor(color, 30);
  ctx.beginPath();
  ctx.ellipse(x, ry - 30 + recoil * 0.3, 10, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.ellipse(x, ry - 30 + recoil * 0.3, 7, 3.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Highlight stripe
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fillRect(x - 5, ry - 26 + recoil * 0.3, 3, 22);

  // Color label
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(COLOR_NAMES[idx], x, ry + 24);

  // Cooldown overlay
  if (state.cannonCooldowns[idx] > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    roundRect(ctx, x - 14, ry - 34, 28, 6, 3);
    ctx.fill();
    ctx.fillStyle = color;
    const cdPct = 1 - state.cannonCooldowns[idx] / 10;
    roundRect(ctx, x - 14, ry - 34, 28 * cdPct, 6, 3);
    ctx.fill();
  }

  ctx.restore();
}

function darkenColor(hex, amount) {
  let r = parseInt(hex.slice(1, 3), 16) - amount;
  let g = parseInt(hex.slice(3, 5), 16) - amount;
  let b = parseInt(hex.slice(5, 7), 16) - amount;
  r = Math.max(0, r); g = Math.max(0, g); b = Math.max(0, b);
  return `rgb(${r},${g},${b})`;
}

function drawHPBar() {
  const barW = 120, barH = 10;
  const barX = GIRL_X - barW / 2;
  const barY = GIRL_Y - 50;

  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  roundRect(ctx, barX - 2, barY - 2, barW + 4, barH + 4, 5);
  ctx.fill();

  const hpPct = Math.max(0, state.girlHP / state.maxGirlHP);
  const hpColor = hpPct > 0.5 ? '#4caf50' : hpPct > 0.25 ? '#ff9800' : '#f44336';

  if (hpPct > 0) {
    ctx.fillStyle = hpColor;
    roundRect(ctx, barX, barY, barW * hpPct, barH, 4);
    ctx.fill();
  }

  ctx.fillStyle = '#fff';
  ctx.font = '10px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText(`❤️ ${Math.max(0, state.girlHP)} / ${state.maxGirlHP}`, GIRL_X, barY - 3);
}

// ---- Level Management ----
function startLevel(lvl) {
  state.level = lvl;
  state.phase = 'playing';
  state.zombies = [];
  state.bullets = [];
  state.particles = [];
  state.floatingTexts = [];
  state.combo = 0;
  state.maxCombo = 0;
  state.comboTimer = 0;
  state.spawnTimer = 0;
  state.zombiesSpawned = 0;
  state.zombiesDefeated = 0;
  state.screenShake = 0;
  state.flashTimer = 0;
  state.girlInvincible = 0;
  state.girlDamageFlash = 0;
  state.girlHP = 5 + Math.floor(lvl / 3);
  state.maxGirlHP = state.girlHP;
  state.zombieSpeed = 0.2 + lvl * 0.04;
  state.totalZombiesInLevel = 5 + lvl * 3;
  state.spawnInterval = Math.max(50, 120 - lvl * 5);

  initCannons();
  hideAllScreens();
}

function gameOver() {
  state.phase = 'over';
  document.getElementById('finalScore').textContent = `分数: ${Math.floor(state.score)}`;
  document.getElementById('finalLevel').textContent = `到达第 ${state.level} 关`;
  document.getElementById('gameOverScreen').classList.remove('hidden');
  sfxLose();
}

function winLevel() {
  state.phase = 'win';
  document.getElementById('winScore').textContent = `分数: ${Math.floor(state.score)}`;
  document.getElementById('winScreen').classList.remove('hidden');
  sfxWin();
}

function hideAllScreens() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('winScreen').classList.add('hidden');
}

// ---- Buttons ----
document.getElementById('btnStart').addEventListener('click', () => {
  ensureAudio();
  state.score = 0;
  startLevel(1);
});
document.getElementById('btnRestart').addEventListener('click', () => {
  ensureAudio();
  state.score = 0;
  startLevel(1);
});
document.getElementById('btnNextLevel').addEventListener('click', () => {
  ensureAudio();
  startLevel(state.level + 1);
});

// ---- Game Loop ----
let lastTime = 0;
function gameLoop(timestamp) {
  // Fixed timestep at ~60fps
  const delta = timestamp - lastTime;
  if (delta < 16.67) {
    // Run at ~60fps
  }
  lastTime = timestamp;

  update();
  draw();
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
