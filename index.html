<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>僵尸围城 · 迷宫保卫</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;display:flex;justify-content:center;align-items:center;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{image-rendering:pixelated}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
"use strict";
const W=420,H=740,PI2=Math.PI*2;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

// --- Audio ---
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new AudioCtx();}
function beep(freq,dur,type,vol){
  if(!audioCtx)return;
  try{
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    o.type=type||'square';
    o.frequency.value=freq;
    g.gain.setValueAtTime(vol||0.08,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.connect(g);g.connect(audioCtx.destination);
    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}
function sfxShoot(){beep(880,0.08,'square',0.06);}
function sfxHit(){beep(440,0.12,'triangle',0.08);}
function sfxKill(){beep(660,0.2,'sine',0.1);setTimeout(()=>beep(880,0.15,'sine',0.08),80);}
function sfxMiss(){beep(220,0.1,'sawtooth',0.04);}
function sfxWaveClear(){beep(523,0.15,'sine',0.1);setTimeout(()=>beep(659,0.15,'sine',0.1),120);setTimeout(()=>beep(784,0.2,'sine',0.1),240);}
function sfxLifeLost(){beep(150,0.3,'sawtooth',0.1);}
function sfxGameOver(){beep(200,0.3,'sawtooth',0.1);setTimeout(()=>beep(150,0.3,'sawtooth',0.1),200);setTimeout(()=>beep(100,0.5,'sawtooth',0.1),400);}

// --- Responsive scaling ---
let scale=1;
function resize(){
  const ww=window.innerWidth,wh=window.innerHeight;
  scale=Math.min(ww/W,wh/H);
  canvas.width=W;canvas.height=H;
  canvas.style.width=(W*scale)+'px';
  canvas.style.height=(H*scale)+'px';
}
window.addEventListener('resize',resize);resize();

// --- Colors ---
const COLORS={red:'#ff3333',blue:'#3388ff',green:'#33cc33',orange:'#ff8800',purple:'#aa33ff'};
const COLOR_KEYS=['red','blue','green','orange','purple'];
const COLOR_VALS=['#ff3333','#3388ff','#33cc33','#ff8800','#aa33ff'];

// --- Utilities ---
function rand(a,b){return a+Math.random()*(b-a);}
function randInt(a,b){return Math.floor(rand(a,b+1));}
function pick(arr){return arr[randInt(0,arr.length-1)];}
function dist(x1,y1,x2,y2){const dx=x1-x2,dy=y1-y2;return Math.sqrt(dx*dx+dy*dy);}
function lerp(a,b,t){return a+(b-a)*t;}

// --- State ---
let gameState='start'; // start, playing, paused, gameover, victory
let score=0, wave=0, lives=3, killsThisWave=0, totalThisWave=0;
let spawnTimer=0, spawnQueue=[], waveClearTimer=0;
let gameTime=0;
const MAX_GAME_TIME=180; // 3 minutes

// --- Maze Path ---
let pathPoints=[];
let pathSegments=[]; // cumulative lengths
let pathTotalLength=0;
const PATH_WIDTH=36;

function generatePath(){
  pathPoints=[];
  const start={x:210,y:0};
  const end={x:210,y:700};
  const numSegments=randInt(3,5); // horizontal segments
  const pts=[start];
  let curX=210, curY=60;
  for(let i=0;i<numSegments;i++){
    const yStep=(600/(numSegments+1));
    const ty=60+yStep*(i+1)+rand(-30,30);
    const tx=randInt(60,360);
    // vertical segment to ty
    pts.push({x:curX,y:ty});
    // horizontal segment to tx
    pts.push({x:tx,y:ty});
    curX=tx;
  }
  pts.push({x:210,y:660});
  pts.push(end);
  pathPoints=pts;
  // compute cumulative lengths
  pathSegments=[0];
  pathTotalLength=0;
  for(let i=1;i<pathPoints.length;i++){
    const d=dist(pathPoints[i-1].x,pathPoints[i-1].y,pathPoints[i].x,pathPoints[i].y);
    pathTotalLength+=d;
    pathSegments.push(pathTotalLength);
  }
}

function getPosOnPath(t){
  const target=t*pathTotalLength;
  for(let i=1;i<pathSegments.length;i++){
    if(target<=pathSegments[i]){
      const segLen=pathSegments[i]-pathSegments[i-1];
      const segT=segLen>0?(target-pathSegments[i-1])/segLen:0;
      return{
        x:lerp(pathPoints[i-1].x,pathPoints[i].x,segT),
        y:lerp(pathPoints[i-1].y,pathPoints[i].y,segT)
      };
    }
  }
  return{...pathPoints[pathPoints.length-1]};
}

// --- Cannons ---
let cannons=[];
function placeCannons(){
  cannons=[];
  const count=randInt(3,4);
  const usedColors=[...COLOR_KEYS].sort(()=>Math.random()-0.5).slice(0,count);
  // place at segments around 25%, 50%, 75%, (maybe 40%) along path
  const positions=count===3?[0.18,0.48,0.78]:[0.15,0.38,0.58,0.82];
  for(let i=0;i<count;i++){
    const t=positions[i];
    const pos=getPosOnPath(t);
    // find nearby segment direction
    const pos2=getPosOnPath(Math.min(1,t+0.02));
    const dx=pos2.x-pos.x, dy=pos2.y-pos.y;
    const len=Math.sqrt(dx*dx+dy*dy)||1;
    const nx=-dy/len, ny=dx/len;
    // place on side, 40px from path center
    const side=(i%2===0)?1:-1;
    cannons.push({
      x:pos.x+nx*side*40,
      y:pos.y+ny*side*40,
      color:usedColors[i],
      cooldown:0,
      pathT:t,
      pathSide:side,
      nx:nx*side,
      ny:ny*side,
      recoil:0
    });
  }
}

// --- Zombies ---
let zombies=[];
const ZOMBIE_TYPES={
  normal:{speed:0.0008,radius:12,orbCount:[1,2],hp:1,color:'#55cc55',eyeColor:'#22aa22'},
  fast:{speed:0.0015,radius:9,orbCount:[1,1],hp:1,color:'#ee6633',eyeColor:'#cc4400'},
  tank:{speed:0.0004,radius:18,orbCount:[3,4],hp:1,color:'#5555cc',eyeColor:'#3333aa'},
  boss:{speed:0.0003,radius:24,orbCount:[5,5],hp:5,color:'#ccaa00',eyeColor:'#aa8800'}
};

function createZombie(type){
  const def=ZOMBIE_TYPES[type];
  const orbCount=randInt(def.orbCount[0],def.orbCount[1]);
  const orbs=[];
  for(let i=0;i<orbCount;i++){
    orbs.push({color:pick(COLOR_KEYS),alive:true});
  }
  return{
    type:type,
    pathT:0,
    speed:def.speed,
    radius:def.radius,
    orbs:orbs,
    hp:def.hp,
    alive:true,
    wobble:Math.random()*PI2,
    stunTimer:0
  };
}

// --- Bullets ---
let bullets=[];
const MAX_BULLETS=10;

function fireCannon(cannon){
  if(cannon.cooldown>0||bullets.length>=MAX_BULLETS)return;
  cannon.cooldown=0.5;
  cannon.recoil=6;
  sfxShoot();
  // find nearest zombie on path that has matching color orb
  let bestZ=null, bestDist=Infinity;
  for(const z of zombies){
    if(!z.alive)continue;
    let hasColor=false;
    for(const o of z.orbs){if(o.alive&&o.color===cannon.color){hasColor=true;break;}}
    if(!hasColor)continue;
    const zPos=getPosOnPath(z.pathT);
    const d=dist(cannon.x,cannon.y,zPos.x,zPos.y);
    if(d<bestDist){bestDist=d;bestZ=z;}
  }
  // find nearest zombie overall (for auto-aim fallback)
  let nearestZ=null,nearestD=Infinity;
  for(const z of zombies){
    if(!z.alive)continue;
    const zPos=getPosOnPath(z.pathT);
    const d=dist(cannon.x,cannon.y,zPos.x,zPos.y);
    if(d<nearestD){nearestD=d;nearestZ=z;}
  }
  const target=bestZ||nearestZ;
  let dx=0,dy=-1;
  if(target){
    const zPos=getPosOnPath(target.pathT);
    dx=zPos.x-cannon.x;dy=zPos.y-cannon.y;
    const l=Math.sqrt(dx*dx+dy*dy)||1;
    dx/=l;dy/=l;
  }
  bullets.push({
    x:cannon.x+dx*20,y:cannon.y+dy*20,
    vx:dx*400,vy:dy*400,
    color:cannon.color,
    alive:true,
    trail:[]
  });
}

// --- Particles ---
let particles=[];
const MAX_PARTICLES=200;

function spawnParticles(x,y,color,count,speed){
  for(let i=0;i<count&&particles.length<MAX_PARTICLES;i++){
    const a=rand(0,PI2);
    const s=rand(30,speed||120);
    particles.push({
      x:x,y:y,
      vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:rand(0.2,0.6),maxLife:0.6,
      color:color,radius:rand(2,5)
    });
  }
}

function spawnMissParticles(x,y){
  spawnParticles(x,y,'#ffffff',5,60);
}

// --- Floating Text ---
let floatingTexts=[];
function spawnText(x,y,text,color){
  floatingTexts.push({x,y,text,color:color||'#ffff00',life:1.0,vy:-40});
}

// --- Game Logic ---
function startWave(){
  wave++;
  killsThisWave=0;
  const baseCount=5+(wave-1)*2;
  totalThisWave=baseCount;
  spawnQueue=[];
  for(let i=0;i<baseCount;i++){
    let type='normal';
    if(wave>=3&&Math.random()<0.25)type='fast';
    if(wave>=4&&Math.random()<0.15)type='tank';
    // boss at wave 5, replaces one zombie
    if(wave>=5&&i===baseCount-1&&wave%5===0)type='boss';
    spawnQueue.push(type);
  }
  spawnTimer=0;
}

function update(dt){
  // Always tick for animations (start screen pulse, etc.)
  gameTime+=dt;
  if(gameState!=='playing')return;
  if(gameTime>=MAX_GAME_TIME){gameState='victory';return;}

  // Spawn zombies
  if(spawnQueue.length>0){
    spawnTimer-=dt;
    if(spawnTimer<=0){
      zombies.push(createZombie(spawnQueue.shift()));
      spawnTimer=1.2;
    }
  }

  // Update zombies
  for(const z of zombies){
    if(!z.alive)continue;
    z.wobble+=dt*3;
    if(z.stunTimer>0){z.stunTimer-=dt;continue;}
    z.pathT+=z.speed*dt;
    if(z.pathT>=1.0){
      z.alive=false;
      lives--;
      sfxLifeLost();
      spawnParticles(210,700,'#ff0000',15,100);
      if(lives<=0){
        gameState='gameover';
        sfxGameOver();
        return;
      }
    }
  }

  // Update cannons
  for(const c of cannons){
    if(c.cooldown>0)c.cooldown-=dt;
    if(c.recoil>0)c.recoil=Math.max(0,c.recoil-dt*30);
  }

  // Update bullets
  for(const b of bullets){
    if(!b.alive)continue;
    b.trail.push({x:b.x,y:b.y});
    if(b.trail.length>6)b.trail.shift();
    b.x+=b.vx*dt;
    b.y+=b.vy*dt;
    // Check collision with zombies
    for(const z of zombies){
      if(!z.alive)continue;
      const zPos=getPosOnPath(z.pathT);
      if(dist(b.x,b.y,zPos.x,zPos.y)<z.radius+5){
        // Check color match
        let matched=false;
        for(const o of z.orbs){
          if(o.alive&&o.color===b.color){
            o.alive=false;
            matched=true;
            sfxHit();
            spawnParticles(b.x,b.y,COLORS[b.color],8,80);
            score+=10;
            break;
          }
        }
        if(!matched){
          sfxMiss();
          spawnMissParticles(b.x,b.y);
        }
        // Check if all orbs destroyed
        let allDead=true;
        for(const o of z.orbs){if(o.alive){allDead=false;break;}}
        if(allDead){
          z.alive=false;
          killsThisWave++;
          const bonus=z.type==='boss'?500:z.type==='tank'?100:z.type==='fast'?50:25;
          score+=bonus;
          sfxKill();
          const zp=getPosOnPath(z.pathT);
          spawnParticles(zp.x,zp.y,'#ffff00',20,150);
          spawnText(zp.x,zp.y-20,'+'+bonus,'#ffff00');
        }
        b.alive=false;
        break;
      }
    }
    // Out of bounds
    if(b.x<-20||b.x>W+20||b.y<-20||b.y>H+20)b.alive=false;
  }

  // Update particles
  for(const p of particles){
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.vy+=200*dt; // gravity
    p.life-=dt;
  }

  // Update floating texts
  for(const ft of floatingTexts){
    ft.y+=ft.vy*dt;ft.life-=dt*1.2;
  }

  // Cleanup
  zombies=zombies.filter(z=>z.alive);
  bullets=bullets.filter(b=>b.alive);
  particles=particles.filter(p=>p.life>0);
  floatingTexts=floatingTexts.filter(f=>f.life>0);

  // Wave clear check
  if(spawnQueue.length===0&&zombies.length===0){
    waveClearTimer+=dt;
    if(waveClearTimer>1.5){
      waveClearTimer=0;
      score+=200;
      sfxWaveClear();
      spawnText(210,350,'波次 '+wave+' 清除！ +200','#00ff88');
      if(wave>=15){gameState='victory';return;}
      startWave();
    }
  }
}

// --- Grass pattern ---
let grassPattern=null;
function createGrassPattern(){
  const pc=document.createElement('canvas');
  pc.width=pc.height=40;
  const pctx=pc.getContext('2d');
  pctx.fillStyle='#1a3a1a';
  pctx.fillRect(0,0,40,40);
  // scattered grass tufts
  for(let i=0;i<30;i++){
    const gx=rand(2,38),gy=rand(2,38);
    pctx.fillStyle=`rgba(${randInt(30,60)},${randInt(80,140)},${randInt(20,50)},0.5)`;
    pctx.fillRect(gx,gy,rand(1,3),rand(1,3));
  }
  grassPattern=ctx.createPattern(pc,'repeat');
}

// --- Draw ---
function draw(){
  ctx.clearRect(0,0,W,H);
  // Background
  ctx.fillStyle=grassPattern||'#1a3a1a';
  ctx.fillRect(0,0,W,H);

  if(gameState==='start'){drawStart();return;}
  if(gameState==='gameover'){drawGame();drawGameOver();return;}
  if(gameState==='victory'){drawGame();drawVictory();return;}
  if(gameState==='paused'){drawGame();drawPaused();return;}
  drawGame();
  // HUD
  drawHUD();
}

function drawPath(){
  if(pathPoints.length<2)return;
  // Border
  ctx.strokeStyle='#5a4a30';ctx.lineWidth=PATH_WIDTH+6;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(pathPoints[0].x,pathPoints[0].y);
  for(let i=1;i<pathPoints.length;i++)ctx.lineTo(pathPoints[i].x,pathPoints[i].y);
  ctx.stroke();
  // Fill
  ctx.strokeStyle='#8B7355';ctx.lineWidth=PATH_WIDTH;
  ctx.beginPath();ctx.moveTo(pathPoints[0].x,pathPoints[0].y);
  for(let i=1;i<pathPoints.length;i++)ctx.lineTo(pathPoints[i].x,pathPoints[i].y);
  ctx.stroke();
  // Dashed center line
  ctx.setLineDash([8,12]);ctx.strokeStyle='#6a5a40';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(pathPoints[0].x,pathPoints[0].y);
  for(let i=1;i<pathPoints.length;i++)ctx.lineTo(pathPoints[i].x,pathPoints[i].y);
  ctx.stroke();ctx.setLineDash([]);
}

function drawCannons(){
  for(const c of cannons){
    ctx.save();
    ctx.translate(c.x,c.y);
    // base
    ctx.fillStyle='#555';ctx.strokeStyle='#333';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,0,14,0,PI2);ctx.fill();ctx.stroke();
    // barrel
    const bx=c.nx*(16-c.recoil),by=c.ny*(16-c.recoil);
    ctx.strokeStyle=COLORS[c.color];ctx.lineWidth=8;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(bx,by);ctx.stroke();
    ctx.strokeStyle='#333';ctx.lineWidth=10;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(bx*0.3,by*0.3);ctx.stroke();
    // color indicator
    ctx.fillStyle=COLORS[c.color];
    ctx.beginPath();ctx.arc(0,0,6,0,PI2);ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
    // cooldown indicator
    if(c.cooldown>0){
      ctx.fillStyle='rgba(0,0,0,0.5)';
      ctx.beginPath();ctx.moveTo(0,0);
      ctx.arc(0,0,14,-Math.PI/2,-Math.PI/2+PI2*(c.cooldown/0.5));
      ctx.closePath();ctx.fill();
    }
    ctx.restore();
  }
}

function drawZombies(){
  // sort by pathT so further zombies drawn first
  const sorted=[...zombies].filter(z=>z.alive).sort((a,b)=>a.pathT-b.pathT);
  for(const z of sorted){
    const pos=getPosOnPath(z.pathT);
    const def=ZOMBIE_TYPES[z.type];
    ctx.save();
    const wx=Math.sin(z.wobble)*2;
    ctx.translate(pos.x+wx,pos.y);
    // shadow
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath();ctx.ellipse(0,z.radius*0.8,z.radius*0.8,z.radius*0.3,0,0,PI2);ctx.fill();
    // body
    ctx.fillStyle=def.color;
    ctx.beginPath();ctx.arc(0,0,z.radius,0,PI2);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=2;ctx.stroke();
    // face highlight
    ctx.fillStyle='rgba(255,255,255,0.15)';
    ctx.beginPath();ctx.arc(-z.radius*0.2,-z.radius*0.2,z.radius*0.6,0,PI2);ctx.fill();
    // eyes
    const es=z.radius*0.25;
    ctx.fillStyle=def.eyeColor;
    ctx.beginPath();ctx.arc(-es*1.2,-es,es,0,PI2);ctx.fill();
    ctx.beginPath();ctx.arc(es*1.2,-es,es,0,PI2);ctx.fill();
    // pupils
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(-es*1.2,-es,es*0.5,0,PI2);ctx.fill();
    ctx.beginPath();ctx.arc(es*1.2,-es,es*0.5,0,PI2);ctx.fill();
    // boss crown
    if(z.type==='boss'){
      ctx.fillStyle='#ffcc00';
      ctx.beginPath();
      ctx.moveTo(-z.radius*0.6,-z.radius-2);
      ctx.lineTo(-z.radius*0.3,-z.radius*0.5);
      ctx.lineTo(0,-z.radius-6);
      ctx.lineTo(z.radius*0.3,-z.radius*0.5);
      ctx.lineTo(z.radius*0.6,-z.radius-2);
      ctx.closePath();ctx.fill();
    }
    // Orbs
    const orbR=5;
    const orbCount=z.orbs.length;
    let aliveIdx=0;
    for(let i=0;i<z.orbs.length;i++){
      if(!z.orbs[i].alive)continue;
      const angle=(aliveIdx/orbCount)*PI2+gameTime*2+i;
      const ox=Math.cos(angle)*(z.radius+8);
      const oy=Math.sin(angle)*(z.radius+8);
      // glow
      ctx.fillStyle=COLORS[z.orbs[i].color]+'44';
      ctx.beginPath();ctx.arc(ox,oy,orbR+3,0,PI2);ctx.fill();
      // orb
      ctx.fillStyle=COLORS[z.orbs[i].color];
      ctx.beginPath();ctx.arc(ox,oy,orbR,0,PI2);ctx.fill();
      ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
      aliveIdx++;
    }
    ctx.restore();
  }
}

function drawBullets(){
  for(const b of bullets){
    if(!b.alive)continue;
    // trail
    for(let i=0;i<b.trail.length;i++){
      const alpha=(i+1)/b.trail.length*0.5;
      ctx.fillStyle=COLORS[b.color]+Math.floor(alpha*255).toString(16).padStart(2,'0');
      ctx.beginPath();ctx.arc(b.trail[i].x,b.trail[i].y,3-i*0.3,0,PI2);ctx.fill();
    }
    // bullet
    ctx.fillStyle=COLORS[b.color];
    ctx.beginPath();ctx.arc(b.x,b.y,5,0,PI2);ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
    // glow
    ctx.fillStyle=COLORS[b.color]+'66';
    ctx.beginPath();ctx.arc(b.x,b.y,8,0,PI2);ctx.fill();
  }
}

function drawParticles(){
  for(const p of particles){
    const alpha=p.life/p.maxLife;
    ctx.globalAlpha=alpha;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.radius*alpha,0,PI2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawFloatingTexts(){
  ctx.textAlign='center';
  for(const ft of floatingTexts){
    ctx.globalAlpha=Math.max(0,ft.life);
    ctx.font='bold 18px sans-serif';
    ctx.fillStyle='#000';
    ctx.fillText(ft.text,ft.x+1,ft.y+1);
    ctx.fillStyle=ft.color;
    ctx.fillText(ft.text,ft.x,ft.y);
  }
  ctx.globalAlpha=1;
  ctx.textAlign='left';
}

function drawGirl(){
  const pos=getPosOnPath(1.0);
  const gx=pos.x, gy=pos.y;
  ctx.save();ctx.translate(gx,gy);
  // body
  ctx.fillStyle='#ff88aa';
  ctx.beginPath();ctx.ellipse(0,5,10,14,0,0,PI2);ctx.fill();
  // head
  ctx.fillStyle='#ffcc99';
  ctx.beginPath();ctx.arc(0,-14,10,0,PI2);ctx.fill();
  // hair
  ctx.fillStyle='#663300';
  ctx.beginPath();ctx.arc(0,-17,11,Math.PI,0);ctx.fill();
  ctx.fillRect(-12,-17,4,12);ctx.fillRect(8,-17,4,12);
  // eyes
  ctx.fillStyle='#333';
  ctx.beginPath();ctx.arc(-4,-14,2,0,PI2);ctx.fill();
  ctx.beginPath();ctx.arc(4,-14,2,0,PI2);ctx.fill();
  // mouth
  ctx.strokeStyle='#cc6666';ctx.lineWidth=1.5;ctx.beginPath();
  ctx.arc(0,-10,3,0.2,Math.PI-0.2);ctx.stroke();
  // hearts for lives
  for(let i=0;i<3;i++){
    const hx=-12+i*12,hy=-34;
    ctx.fillStyle=i<lives?'#ff3355':'#555';
    ctx.beginPath();
    ctx.moveTo(hx,hy+3);
    ctx.bezierCurveTo(hx,hy,hx-5,hy,hx-5,hy+3);
    ctx.bezierCurveTo(hx-5,hy+6,hx,hy+8,hx,hy+11);
    ctx.bezierCurveTo(hx,hy+8,hx+5,hy+6,hx+5,hy+3);
    ctx.bezierCurveTo(hx+5,hy,hx,hy,hx,hy+3);
    ctx.fill();
    ctx.strokeStyle=i<lives?'#cc0033':'#444';
    ctx.lineWidth=1;ctx.stroke();
  }
  ctx.restore();
}

function drawGame(){
  drawPath();
  drawGirl();
  drawCannons();
  drawZombies();
  drawBullets();
  drawParticles();
  drawFloatingTexts();
}

function drawHUD(){
  // Top bar background
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillRect(0,0,W,42);
  // wave
  ctx.fillStyle='#fff';ctx.font='bold 16px sans-serif';ctx.textAlign='left';
  ctx.fillText('波次 '+wave,10,28);
  // score
  ctx.textAlign='center';ctx.fillText('分数: '+score,W/2,28);
  // pause button
  ctx.textAlign='right';ctx.fillStyle='#aaa';ctx.font='14px sans-serif';
  ctx.fillText('⏸ 暂停',W-12,28);
  // progress bar
  const barY=44,barH=6;
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(0,barY,W,barH);
  const progress=totalThisWave>0?killsThisWave/totalThisWave:0;
  ctx.fillStyle='#00cc66';ctx.fillRect(0,barY,W*progress,barH);
  // time
  const timeLeft=Math.max(0,MAX_GAME_TIME-gameTime);
  const mins=Math.floor(timeLeft/60);
  const secs=Math.floor(timeLeft%60);
  ctx.fillStyle='#ffcc00';ctx.font='12px sans-serif';ctx.textAlign='center';
  ctx.fillText('⏱ '+mins+':'+secs.toString().padStart(2,'0'),W/2,barY+barH+14);
  ctx.textAlign='left';
}

function drawStart(){
  // background overlay
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  // title
  ctx.font='bold 36px sans-serif';ctx.fillStyle='#ff4444';
  ctx.fillText('僵尸围城',W/2,H/2-80);
  ctx.font='bold 28px sans-serif';ctx.fillStyle='#ffcc00';
  ctx.fillText('迷宫保卫',W/2,H/2-40);
  // instructions
  ctx.font='16px sans-serif';ctx.fillStyle='#ccc';
  ctx.fillText('点击炮台发射子弹',W/2,H/2+20);
  ctx.fillText('同色子弹消灭同色僵尸',W/2,H/2+45);
  ctx.fillText('消灭所有僵尸的光环即可击杀',W/2,H/2+70);
  // tap to start
  const pulse=0.6+Math.sin(gameTime*3)*0.4;
  ctx.globalAlpha=pulse;
  ctx.font='bold 22px sans-serif';ctx.fillStyle='#fff';
  ctx.fillText('点击屏幕开始游戏',W/2,H/2+130);
  ctx.globalAlpha=1;
  // illustration
  ctx.font='bold 20px sans-serif';ctx.fillStyle='#55cc55';
  ctx.fillText('🧟',W/2-60,H/2+190);
  ctx.fillStyle='#8B7355';ctx.fillText('🏰',W/2,H/2+190);
  ctx.fillStyle='#ff88aa';ctx.fillText('👧',W/2+60,H/2+190);
  ctx.textAlign='left';
}

function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 36px sans-serif';ctx.fillStyle='#ff3333';
  ctx.fillText('游戏结束',W/2,H/2-30);
  ctx.font='20px sans-serif';ctx.fillStyle='#fff';
  ctx.fillText('最终分数: '+score,W/2,H/2+20);
  ctx.fillText('到达波次: '+wave,W/2,H/2+50);
  const pulse=0.6+Math.sin(gameTime*3)*0.4;
  ctx.globalAlpha=pulse;
  ctx.font='18px sans-serif';ctx.fillStyle='#aaa';
  ctx.fillText('点击屏幕重新开始',W/2,H/2+100);
  ctx.globalAlpha=1;ctx.textAlign='left';
}

function drawVictory(){
  ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 36px sans-serif';ctx.fillStyle='#00ff88';
  ctx.fillText('🎉 胜利！',W/2,H/2-30);
  ctx.font='20px sans-serif';ctx.fillStyle='#fff';
  ctx.fillText('最终分数: '+score,W/2,H/2+20);
  ctx.fillText('所有僵尸已被击退！',W/2,H/2+50);
  const pulse=0.6+Math.sin(gameTime*3)*0.4;
  ctx.globalAlpha=pulse;
  ctx.font='18px sans-serif';ctx.fillStyle='#aaa';
  ctx.fillText('点击屏幕重新开始',W/2,H/2+100);
  ctx.globalAlpha=1;ctx.textAlign='left';
}

function drawPaused(){
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 36px sans-serif';ctx.fillStyle='#fff';
  ctx.fillText('⏸ 已暂停',W/2,H/2-10);
  ctx.font='18px sans-serif';ctx.fillStyle='#aaa';
  ctx.fillText('点击屏幕继续',W/2,H/2+30);
  ctx.textAlign='left';
}

// --- Input ---
function getInputPos(e){
  const rect=canvas.getBoundingClientRect();
  const touch=e.touches?e.touches[0]:e;
  return{
    x:(touch.clientX-rect.left)/scale,
    y:(touch.clientY-rect.top)/scale
  };
}

function handleClick(e){
  e.preventDefault();
  initAudio();
  const p=getInputPos(e);

  if(gameState==='start'){
    resetGame();
    gameState='playing';
    return;
  }
  if(gameState==='gameover'||gameState==='victory'){
    gameState='start';
    return;
  }
  if(gameState==='paused'){
    // check if tap on pause button area
    if(p.x>W-80&&p.y<42){return;}
    gameState='playing';
    return;
  }
  if(gameState==='playing'){
    // Check pause button
    if(p.x>W-80&&p.y<42){
      gameState='paused';
      return;
    }
    // Check cannon taps
    for(const c of cannons){
      if(dist(p.x,p.y,c.x,c.y)<25){
        fireCannon(c);
        return;
      }
    }
  }
}

canvas.addEventListener('click',handleClick);
canvas.addEventListener('touchstart',function(e){e.preventDefault();handleClick(e);},{passive:false});

function resetGame(){
  score=0;wave=0;lives=3;killsThisWave=0;totalThisWave=0;
  gameTime=0;zombies=[];bullets=[];particles=[];floatingTexts=[];
  spawnQueue=[];spawnTimer=0;waveClearTimer=0;
  generatePath();
  placeCannons();
  createGrassPattern();
  startWave();
}

// --- Main Loop ---
let lastTime=0;
function loop(ts){
  const dt=Math.min((ts-lastTime)/1000,1/30);
  lastTime=ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// Init
createGrassPattern();
generatePath();
placeCannons();
requestAnimationFrame(loop);
})();
</script>
